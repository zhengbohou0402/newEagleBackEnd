server.port=${SERVER_PORT:8080}

# Tencent Map keys must be supplied by environment variables or local config.
tencent.map.key=${TENCENT_MAP_KEY:}
tencent.map.js-key=${TENCENT_MAP_JS_KEY:}
tencent.map.api-domain=${TENCENT_MAP_API_DOMAIN:https://apis.map.qq.com/}
tencent.map.domain=${TENCENT_MAP_DOMAIN:https://map.qq.com/}

# Database config. Override SPRING_DATASOURCE_URL for the real SQLite file.
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:./db.sqlite3}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:20000}

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}

app.heatmap.enable-geocode=${APP_HEATMAP_ENABLE_GEOCODE:true}
app.heatmap.max-points=${APP_HEATMAP_MAX_POINTS:10000}
app.heatmap.region.min-lng=${APP_HEATMAP_REGION_MIN_LNG:102.5}
app.heatmap.region.max-lng=${APP_HEATMAP_REGION_MAX_LNG:104.9}
app.heatmap.region.min-lat=${APP_HEATMAP_REGION_MIN_LAT:30.0}
app.heatmap.region.max-lat=${APP_HEATMAP_REGION_MAX_LAT:31.5}
app.geocode.permits-per-second=${APP_GEOCODE_PERMITS_PER_SECOND:3}
